<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NetTrackpad - Remote Trackpad</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Background glows -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
        <div class="glass-panel auth-card">
            <div class="logo-container">
                <i data-lucide="mouse-pointer" class="logo-icon animate-pulse-glow"></i>
                <h1>NetTrackpad</h1>
                <p>Secure Local Trackpad Controller</p>
            </div>
            
            <form id="auth-form">
                <div class="input-group">
                    <label for="password-input">Enter Access Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="key" class="input-icon"></i>
                        <input type="password" id="password-input" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">
                    <span>Connect</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>
            <p id="auth-error" class="error-text hidden">Incorrect password. Please try again.</p>
        </div>
    </div>

    <!-- Main Controller Screen -->
    <div id="main-screen" class="screen">
        <header class="header">
            <div class="brand">
                <h2>NetTrackpad</h2>
            </div>
            <div class="header-right">
                <div class="status-badge disconnected" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-text">Connecting...</span>
                </div>
                <button id="btn-menu" class="btn-icon glass-panel-interactive" aria-label="Open Settings">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </header>

        <!-- Main Workspace (Full screen trackpad + Scroll area) -->
        <main class="workspace">
            <div class="trackpad-container">
                <div id="trackpad" class="trackpad">
                    <div class="trackpad-overlay">
                        <i data-lucide="mouse" class="trackpad-bg-icon"></i>
                        <span class="trackpad-hint">Slide to move • Tap to click • 2-finger scroll</span>
                    </div>
                    <!-- Touch indicator dot -->
                    <div id="touch-indicator" class="touch-dot"></div>
                </div>
            </div>

            <!-- Scroll Zone / Wheel -->
            <div class="scroll-container">
                <div id="scroll-wheel" class="scroll-wheel glass-panel-interactive">
                    <div class="scroll-label">
                        <i data-lucide="chevrons-up" class="scroll-icon-up"></i>
                        <span>SCROLL</span>
                        <i data-lucide="chevrons-down" class="scroll-icon-down"></i>
                    </div>
                    <div class="scroll-ridges"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Drawer Overlay -->
    <div id="settings-drawer" class="drawer-overlay hidden">
        <div class="drawer-content glass-panel">
            <div class="drawer-header">
                <h3>Settings</h3>
                <button id="btn-close-drawer" class="btn-icon-close" aria-label="Close Settings">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="drawer-body">
                <!-- Sensitivity control -->
                <div class="control-group">
                    <div class="control-label">
                        <i data-lucide="sliders" class="control-icon"></i>
                        <span>Sensitivity</span>
                        <span id="sensitivity-value">1.5x</span>
                    </div>
                    <div class="slider-wrapper">
                        <input type="range" id="sensitivity" min="0.2" max="4.0" step="0.1" value="1.5">
                    </div>
                </div>
                
                <!-- Action triggers -->
                <div class="control-group buttons-group">
                    <button id="btn-scrollbar-toggle" class="btn btn-secondary active">
                        <i data-lucide="scroll"></i>
                        <span>Scrollbar</span>
                    </button>
                    <button id="btn-natural-scroll-toggle" class="btn btn-secondary active">
                        <i data-lucide="arrow-up-down"></i>
                        <span>Natural Scroll</span>
                    </button>
                    <button id="btn-horizontal-mode-toggle" class="btn btn-secondary">
                        <i data-lucide="rotate-cw"></i>
                        <span>Horizontal</span>
                    </button>
                    <button id="btn-fullscreen" class="btn btn-secondary">
                        <i data-lucide="maximize"></i>
                        <span>Fullscreen</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden">
        <span id="toast-message">Message here</span>
    </div>

    <script src="/static/app.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
